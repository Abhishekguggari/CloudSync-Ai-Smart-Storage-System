<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings | CloudSync AI</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<style>

.settings-container{

padding:40px;

color:white;

}

.settings-card{

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

padding:30px;

border-radius:20px;

width:500px;

box-shadow:0 10px 30px rgba(0,0,0,0.3);

}

.setting-item{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 0;

border-bottom:1px solid rgba(255,255,255,0.1);

}

.switch{

position:relative;

display:inline-block;

width:60px;

height:30px;

}

.switch input{

opacity:0;

width:0;

height:0;

}

.slider{

position:absolute;

cursor:pointer;

top:0;

left:0;

right:0;

bottom:0;

background:#555;

transition:0.4s;

border-radius:34px;

}

.slider:before{

position:absolute;

content:"";

height:22px;

width:22px;

left:4px;

bottom:4px;

background:white;

transition:0.4s;

border-radius:50%;

}

input:checked + .slider{

background:#00c6ff;

}

input:checked + .slider:before{

transform:translateX(28px);

}

.save-btn{

margin-top:30px;

padding:14px;

width:100%;

border:none;

border-radius:12px;

background:linear-gradient(
90deg,
#00c6ff,
#0072ff
);

color:white;

font-size:16px;

cursor:pointer;

font-weight:bold;

}

.save-btn:hover{

opacity:0.9;

}

</style>

</head>

<body>

<div class="settings-container">

<h1>⚙ System Settings</h1>

<div class="settings-card">

<div class="setting-item">

<span>☁ Cloud Sync</span>

<label class="switch">

<input type="checkbox" checked>

<span class="slider"></span>

</label>

</div>

<div class="setting-item">

<span>🔐 Encryption</span>

<label class="switch">

<input type="checkbox" checked>

<span class="slider"></span>

</label>

</div>

<div class="setting-item">

<span>🤖 AI Features</span>

<label class="switch">

<input type="checkbox" checked>

<span class="slider"></span>

</label>

</div>

<div class="setting-item">

<span>🌙 Dark Mode</span>

<label class="switch">

<input type="checkbox" checked>

<span class="slider"></span>

</label>

</div>

<div class="setting-item">

<span>📢 Notifications</span>

<label class="switch">

<input type="checkbox">

<span class="slider"></span>

</label>

</div>

<button class="save-btn">

Save Settings

</button>

</div>

</div>

</body>
</html>
