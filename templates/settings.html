<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | CloudSync AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        function toggleDarkMode(){
            document.body.classList.toggle("light-mode");
            localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
        }

        window.onload = function(){
            let theme = localStorage.getItem("theme");
            let dmCheckbox = document.getElementById("dark-mode-checkbox");
            if(theme === "light"){
                document.body.classList.add("light-mode");
                if (dmCheckbox) dmCheckbox.checked = false; // Sync switch visual state
            } else {
                if (dmCheckbox) dmCheckbox.checked = true;
            }
        }
    </script>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div>
                <h1>☁ CloudSync AI</h1>
                <a href="/dashboard">📂 Dashboard</a>
                <a href="/upload">⬆ Upload Files</a>
                <a href="/search">🤖 AI Search</a>
                <a href="/analytics">📊 Analytics</a>
                <a href="/settings" class="active-link">⚙ Settings</a>
            </div>
            <a href="/logout" class="logout-btn">🚪 Logout</a>
        </div>

        <div class="main-content">
            <div class="topbar">
                <div>
                    <h2>Settings</h2>
                    <p class="top-text">Manage your intelligent cloud preferences</p>
                </div>
                <div class="profile-box">
                    {{ session.get('user', 'User') }}
                </div>
            </div>

            <div class="table-section">
                <div class="table-header">
                    <h2>System Preferences</h2>
                </div>
                
                <form action="/settings/save" method="POST">
                    <div class="setting-item">
                        <h3>☁ Cloud Sync</h3>
                        <label class="switch">
                            <input type="checkbox" name="cloud_sync" {% if settings.get('cloud_sync') == 'Enabled' %}checked{% endif %}>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="setting-item">
                        <h3>🔐 Encryption</h3>
                        <label class="switch">
                            <input type="checkbox" name="encryption" {% if settings.get('encryption') == 'Enabled' %}checked{% endif %}>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="setting-item">
                        <h3>🤖 AI Features</h3>
                        <label class="switch">
                            <input type="checkbox" name="ai_features" {% if settings.get('ai_features') == 'Enabled' %}checked{% endif %}>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="setting-item">
                        <h3>🌙 Dark Mode</h3>
                        <label class="switch">
                            <input type="checkbox" id="dark-mode-checkbox" name="dark_mode" onclick="toggleDarkMode()">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="setting-item">
                        <h3>📢 Notifications</h3>
                        <label class="switch">
                            <input type="checkbox" name="notifications" {% if settings.get('notifications') == 'Enabled' %}checked{% endif %}>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <button type="submit" class="download-btn" style="margin-top:30px; cursor: pointer; border: none;">
                        Save Settings
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
