<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | CloudSync AI</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
<script src="{{ url_for('static', filename='script.js') }}"></script>

</head>

<body>

<div class="background-blur"></div>

<div class="auth-container">

<div class="logo" onclick="window.location.href='/'" style="cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;" title="Go to Home">
<span class="cloud-icon"></span> CloudSync AI
</div>

<h1>Welcome Back</h1>

<p class="subtitle">
Access your intelligent cloud storage platform
</p>

<form method="POST" action="/">

<input
type="text"
name="username"
placeholder="👤 Username"
required>

<input
type="password"
name="password"
placeholder="🔒 Password"
required>

<button type="submit">
✨ Secure Login
</button>

<p class="bottom-text">
Don't have an account?

<a href="/register">
Register
</a>

</p>

</form>

</div>

</body>
</html>
